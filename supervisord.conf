[supervisord]
nodaemon=true
user=root

[program:backend]
command=python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8000
directory=/app/backend_engine
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
# Next.js standalone server is at the root in production
command=node server.js
directory=/app
autostart=true
autorestart=true
environment=NODE_ENV="production",HOSTNAME="0.0.0.0"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
